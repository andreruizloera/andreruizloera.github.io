<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <title>How to Design Better with AI — Andre Ruiz Loera</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .post { max-width: 680px; }

    /* Drifting gradient hero */
    .hero {
      position: relative; overflow: hidden; border-radius: 16px;
      padding: 48px 40px; margin: 8px 0 40px; color: #fff;
      background-image: linear-gradient(120deg, #1f2937, #0e7490, #5b21b6, #1f2937);
      background-size: 300% 300%; animation: gradient-drift 14s ease infinite;
    }
    .hero::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background-image: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.22), transparent 45%);
    }
    .hero h1 { color: #fff; font-size: 2.5rem; line-height: 1.1; margin: 0; }
    @keyframes gradient-drift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Word-by-word reveal. A real space text node sits between word spans
       so the spacing never collapses. */
    .stagger .word {
      display: inline-block; opacity: 0; transform: translateY(0.4em);
      transition: opacity 0.5s cubic-bezier(0.22,1,0.36,1), transform 0.5s cubic-bezier(0.22,1,0.36,1);
    }
    .stagger.in .word { opacity: 1; transform: none; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
      .stagger .word { opacity: 1 !important; transform: none !important; }
    }
    @media (max-width: 700px) {
      .hero { padding: 32px 24px; } .hero h1 { font-size: 1.9rem; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <nav>
    <div class="nav-logo"><a href="../index.html">ARL</a></div>
    <ul>
      <li><a href="../index.html">About</a></li>
      <li><a href="../research/index.html">Research</a></li>
      <li><a href="../blog/index.html" class="active">Blog</a></li>
      <li><a href="../annotations/index.html">Annotations</a></li>
      <li><a href="../reading-lists/index.html">Reading Lists</a></li>
      <li><a href="../press/index.html">Press</a></li>
    </ul>
  </nav>

  <main id="main">
    <a href="index.html" class="back-link">&larr; All posts</a>

    <article class="post">
      <div class="hero">
        <h1 class="stagger" id="hero-title">How to Design Better with AI</h1>
      </div>
    </article>
  </main>

  <button type="button" class="theme-toggle" onclick="toggleTheme()" id="theme-btn" aria-label="Toggle dark mode"><span aria-hidden="true">Dark</span></button>

  <script>
    (function () {
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
      document.addEventListener('DOMContentLoaded', function () {
        document.getElementById('theme-btn').textContent = t === 'dark' ? 'Light' : 'Dark';
      });
    })();
    function toggleTheme() {
      var t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      document.getElementById('theme-btn').textContent = t === 'dark' ? 'Light' : 'Dark';
    }

    document.addEventListener('DOMContentLoaded', function () {
      // Split the title into words, with a real space between each so it doesn't jam together.
      document.querySelectorAll('.stagger').forEach(function (el) {
        var words = el.textContent.trim().split(/\s+/);
        el.textContent = '';
        words.forEach(function (w, i) {
          var s = document.createElement('span');
          s.className = 'word';
          s.textContent = w;
          s.style.transitionDelay = (i * 0.07) + 's';
          el.appendChild(s);
          el.appendChild(document.createTextNode(' '));
        });
      });
      var hero = document.getElementById('hero-title');
      if (hero) requestAnimationFrame(function () { hero.classList.add('in'); });
    });
  </script>
</body>
</html>
